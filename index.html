<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo interativo de diretrizes para o uso de IA Generativa no ensino de programação.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23667eea'>🧠</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <title id="pageTitle">Diretrizes IA</title>
</head>
<body>
    <header>
        <div class="header-title" id="siteTitle">Diretrizes para o Uso de Inteligência Artificial Generativa no Ensino de Programação</div>
        <div class="language-toggle">
            <span class="globe-icon" aria-hidden="true">🌐</span>
            <button class="lang-btn active" id="ptBtn" data-lang="pt">PT-BR</button>
            <button class="lang-btn" id="enBtn" data-lang="en">EN-US</button>
        </div>
    </header>

    <div class="search-container">
        <input
            type="search"
            class="search-input"
            id="searchInput"
            placeholder="Pesquisar diretrizes..."
            aria-label="Pesquisar diretrizes"
        >
    </div>

    <main class="cards-container" id="cardsContainer">
        <div class="loading" id="loadingMessage">Carregando...</div>
    </main>

    <!-- Toast de feedback -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
